server:
  port: 8028
  shutdown: graceful
  tomcat:
    threads:
      max: 500
      min-spare: 20
    max-connections: 500
    accept-count: 200
    max-http-form-post-size: 10MB

logging:
  level:
    ROOT: INFO
    com.apus.base: DEBUG

spring:
  application:
    name: apus-support-service
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  liquibase:
    enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/salehub_db
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    enabled: true
    healthcheck:
      enabled: true
    fetch-registry: true
    register-with-eureka: true
    instance-info-replication-interval-seconds: 10
    registry-fetch-interval-seconds: 10
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    appname: sales-hub
    instanceId: sales-hub:${spring.application.instance-id:${random.value}}
    prefer-ip-address: true
    virtual-host-name: sales-hub
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    status-page-url-path: ${management.endpoints.web.base-path}/info
    health-check-url-path: ${management.endpoints.web.base-path}/health
    metadata-map:
      zone: primary

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: [ 'health', 'info' ]
  tracing:
    sampling:
      probability: 1.0

feign:
  circuitbreaker:
    enabled: true

beans:
  changelog: false
  relation-mapping: true

multi-tenancy:
  resolver: false
  routing-data-source: false
  data-source-settings-endpoint: http://uaa/internal-api/v1/tenant/data-source

kafka:
  enabled: false